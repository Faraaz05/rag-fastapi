services:
  chromadb:
    image: chromadb/chroma:latest
    container_name: chromadb
    ports:
      - "8001:8000"
    volumes:
      - ./chroma_data:/data  # Persists your vector DB to your local machine
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    

  fastapi:
    build: .
    container_name: rag_fastapi
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - chromadb
    restart: unless-stopped
    

  worker:
    image: pdf-worker:latest
    container_name: rag_worker
    env_file:
      - .env.worker
    depends_on:
      - chromadb
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - ./unstructured_cache:/root/.cache/huggingface
    restart: unless-stopped
    
  transcriber:
    image: faster-whisper-image
    container_name: faster-whisper
    env_file:
      - .env.audio
    depends_on:
      - chromadb
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - ./input:/data/input
      - ./output:/data/output
      - ./model_cache:/root/.cache/huggingface
      - ./torch_cache:/root/.cache/torch
    restart: unless-stopped
